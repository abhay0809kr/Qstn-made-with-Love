<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEET CBT</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="exam-container">

<header>

<h2>📝 QSTN MADE WITH LOVE ❤️</h2>

<div class="top-bar">

<span id="candidate"></span>

<span id="timer">90:00</span>

</div>

</header>

<hr>

<div class="question-box">

<h3 id="questionNumber"></h3>

<p id="questionText"></p>

<div class="options">

<label>
<input type="radio" name="option" value="0">
<span id="op1"></span>
</label>

<label>
<input type="radio" name="option" value="1">
<span id="op2"></span>
</label>

<label>
<input type="radio" name="option" value="2">
<span id="op3"></span>
</label>

<label>
<input type="radio" name="option" value="3">
<span id="op4"></span>
</label>

</div>

</div>

<div class="buttons">

<button id="prevBtn">◀ Previous</button>

<button id="reviewBtn">🟣 Mark for Review & Next</button>

<button id="nextBtn">💾 Save & Next ▶</button>

</div>

<hr>

<div class="palette">

<h3>Questions</h3>

<div id="numbers">

</div>

</div>

<button class="submit">

Submit Test

</button>

</div>

<script src="questions.js"></script>

<script type="module" src="script.js"></script>

</body>

</html>
